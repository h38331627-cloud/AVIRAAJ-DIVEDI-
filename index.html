<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>AVIRAAJ DIVEDI 3D PREMIUM</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: radial-gradient(circle at top, #000, #020202); overflow:hidden; }

.phone {
  width: 360px;
  height: 720px;
  border-radius: 50px;
  background: linear-gradient(145deg, #0a0a0a, #000);
  box-shadow: 0 0 80px rgba(0,255,255,0.2), inset 0 0 30px rgba(255,255,255,0.05);
  margin: 30px auto;
  position: relative;
  overflow: hidden;
}

.notch {
  width: 190px;
  height: 30px;
  background: #000;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  z-index: 20;
}

.layer { position: absolute; inset: 0; }

.bg-layer {
  background: url('https://raw.githubusercontent.com/h38331627-cloud/AVIRAAJ-DIVEDI-/main/imgeavirajdivedi.jpg') center/cover;
  filter: blur(2px) brightness(0.4);
  transform: scale(1.1);
}

.overlay-layer {
  background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
}

/* MONEY RAIN */
.money {
  position: absolute;
  top: -50px;
  width: 40px;
  animation: fall linear infinite;
  opacity: 0.8;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(800px) rotate(360deg); }
}

.content {
  position: relative;
  z-index: 10;
  color: white;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 20px;
  text-align: center;
}

.topbar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  opacity: 0.8;
}

.name {
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(45deg, gold, orange, yellow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
}

.profile {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid gold;
  box-shadow: 0 0 30px gold, 0 0 60px rgba(255,215,0,0.5);
  margin: 10px auto;
}

.badge {
  display: inline-block;
  margin-top: 5px;
  padding: 5px 12px;
  background: linear-gradient(45deg, red, orange);
  border-radius: 20px;
  font-size: 12px;
  box-shadow: 0 0 15px red;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}

.stat {
  padding: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
  font-size: 13px;
}

.countdown {
  font-size: 30px;
  color: #00ffff;
  text-shadow: 0 0 15px cyan;
  margin-top: 10px;
}

.btn {
  margin-top: 15px;
  padding: 16px;
  width: 100%;
  background: linear-gradient(45deg, #00f0ff, #007bff);
  border-radius: 14px;
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 0 0 25px cyan;
  transform: perspective(500px) rotateX(10deg);
  transition: 0.3s;
}

.btn:hover {
  transform: perspective(500px) rotateX(0deg) scale(1.05);
}

.chat {
  position: absolute;
  bottom: 90px;
  left: 15px;
  right: 15px;
}

.msg {
  background: rgba(255,255,255,0.1);
  padding: 8px;
  margin-top: 5px;
  border-radius: 10px;
  font-size: 12px;
  backdrop-filter: blur(5px);
  animation: float 3s infinite;
}

@keyframes float {
  0% { transform: translateY(10px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10px); opacity: 0; }
}

.ui-layer {
  pointer-events: none;
  box-shadow: inset 0 0 80px rgba(0,0,0,1);
}
</style>
</head>
<body>

<!-- MONEY RAIN ELEMENTS -->

      <p class="text-sm mt-2">India's Biggest Cricket Predictor 👑</p>

      <div class="stats">
        <div class="stat">👥 33K Members</div>
        <div class="stat">🎯 94% Accuracy</div>
      </div>

      <div class="countdown" id="count">30</div>

      <a href="https://t.me/+cLrxxtYfFhFhZGJl">
        <div class="btn">JOIN TELEGRAM NOW</div>
      </a>
    </div>

  </div>

  <div class="chat">
    <div class="msg">💸 10K PROFIT THANKS SIR</div>
    <div class="msg">🔥 BACK TO BACK WIN</div>
    <div class="msg">👑 REAL KING OF TOSS</div>
  </div>

</div>

},1000);
</script>

</body>
</html>
