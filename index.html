<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIRAAJ DIVEDI PREMIUM</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: radial-gradient(circle, #000, #050505); }

.phone {
  width: 340px;
  height: 680px;
  border: 14px solid #111;
  border-radius: 45px;
  position: relative;
  overflow: hidden;
  margin: 40px auto;
  box-shadow: 0 0 60px rgba(0,0,0,1);
}

.notch {
  width: 180px;
  height: 28px;
  background: #000;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  z-index: 10;
}

.layer { position: absolute; inset: 0; }

.bg-layer {
  background-image: url('https://raw.githubusercontent.com/h38331627-cloud/AVIRAAJ-DIVEDI-/main/imgeavirajdivedi.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(3px) brightness(0.5);
  animation: zoom 20s infinite alternate;
}

@keyframes zoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.15); }
}

.overlay-layer {
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
}

.content-layer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  color: white;
  text-align: center;
  padding: 20px;
}

.top-bar {
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  width: 100%;
  opacity: 0.8;
}

.profile {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid gold;
  box-shadow: 0 0 20px gold;
}

.name {
  font-size: 22px;
  font-weight: bold;
  color: #ffd700;
}

.badge {
  background: red;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.stats {
  display: flex;
  gap: 15px;
  margin-top: 10px;
}

.stat-box {
  background: rgba(255,255,255,0.1);
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
}

.countdown {
  font-size: 26px;
  color: yellow;
  font-weight: bold;
}

.btn {
  margin-top: 10px;
  padding: 14px 25px;
  background: linear-gradient(45deg, cyan, blue);
  color: white;
  font-weight: bold;
  border-radius: 12px;
  animation: glow 1.5s infinite;
}

@keyframes glow {
  0% { box-shadow: 0 0 10px cyan; }
  50% { box-shadow: 0 0 25px cyan; }
  100% { box-shadow: 0 0 10px cyan; }
}

.chat {
  position: absolute;
  bottom: 80px;
  left: 10px;
  right: 10px;
}

.chat-msg {
  background: rgba(255,255,255,0.1);
  margin-top: 5px;
  padding: 6px;
  border-radius: 8px;
  font-size: 11px;
  text-align: left;
  animation: fadeIn 2s infinite;
}

@keyframes fadeIn {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}

.ui-layer {
  pointer-events: none;
  box-shadow: inset 0 0 60px rgba(0,0,0,1);
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="layer bg-layer"></div>
  <div class="layer overlay-layer"></div>

  <div class="layer content-layer">
    <div class="top-bar">
      <span>9:41</span>
      <span>📶 🔋</span>
    </div>

    <div>
      <h1 class="name">AVIRAAJ DIVEDI</h1>
      <span class="badge">LIVE</span>

      <img src="https://raw.githubusercontent.com/h38331627-cloud/AVIRAAJ-DIVEDI-/main/image1avi.jpg" class="profile">

      <p class="mt-2 text-sm">India's No.1 Cricket Predictor 👑</p>

      <div class="stats">
        <div class="stat-box">🔥 12.5K Members</div>
        <div class="stat-box">🎯 92% Accuracy</div>
      </div>

      <div class="countdown" id="count">30</div>

      <a href="https://t.me/+cLrxxtYfFhFhZGJl">
        <button class="btn">JOIN TELEGRAM NOW</button>
      </a>
    </div>
  </div>

  <div class="chat">
    <div class="chat-msg">💰 Bhai kal 5k jeeta 🔥</div>
    <div class="chat-msg">🎯 Aaj ka match bhi sahi diya</div>
    <div class="chat-msg">👑 King ho bhai</div>
  </div>

  <div class="layer ui-layer"></div>
</div>

<script>
let t = 30;
setInterval(()=>{
  document.getElementById('count').innerText = t;
  t--;
  if(t<0) t=30;
},1000);
</script>

</body>
</html>
