<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIRAAJ DIVEDI</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #111;
}

/* iPhone Frame */
.phone {
  width: 320px;
  height: 640px;
  border: 12px solid #222;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
  margin: 40px auto;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* Notch */
.notch {
  width: 160px;
  height: 25px;
  background: #000;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  border-bottom-left-radius: 15px;
  border-bottom-right-radius: 15px;
  z-index: 5;
}

/* Layers */
.layer {
  position: absolute;
  inset: 0;
}

/* Layer 1 - Background */
.bg-layer {
  background-image: url('https://raw.githubusercontent.com/h38331627-cloud/AVIRAAJ-DIVEDI-/main/imgeavirajdivedi.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(2px) brightness(0.6);
}

/* Layer 2 - Overlay */
.overlay-layer {
  background: rgba(0,0,0,0.5);
}

/* Layer 3 - Content */
.content-layer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  padding: 20px;
}

/* Layer 4 - UI Effects */
.ui-layer {
  pointer-events: none;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
}

.profile {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid gold;
  margin-top: 20px;
}

.btn {
  margin-top: 20px;
  padding: 12px 20px;
  background: cyan;
  color: black;
  font-weight: bold;
  border-radius: 10px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.countdown {
  font-size: 24px;
  color: yellow;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <!-- Layer 1 -->
  <div class="layer bg-layer"></div>

  <!-- Layer 2 -->
  <div class="layer overlay-layer"></div>

  <!-- Layer 3 -->
  <div class="layer content-layer">
    <h1 class="text-xl font-bold text-yellow-400">AVIRAAJ DIVEDI</h1>

    <img src="https://raw.githubusercontent.com/h38331627-cloud/AVIRAAJ-DIVEDI-/main/image1avi.jpg" class="profile">

    <p class="mt-2 text-sm">Cricket Prediction King 👑</p>

    <div class="countdown" id="count">30</div>

    <a href="https://t.me/+cLrxxtYfFhFhZGJl">
      <button class="btn">JOIN TELEGRAM</button>
    </a>
  </div>

  <!-- Layer 4 -->
  <div class="layer ui-layer"></div>
</div>

<script>
let t = 30;
setInterval(()=>{
  document.getElementById('count').innerText = t;
  t--;
  if(t<0) t=30;
},1000);
</script>

</body>
</html>
